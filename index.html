<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Resultados Segunda Vuelta</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 40px;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 20px;
    }
    .candidato {
      margin: 20px 0;
    }
    .barra {
      height: 25px;
      background-color: #ddd;
      border-radius: 5px;
      overflow: hidden;
      margin-top: 5px;
    }
    .relleno {
      height: 100%;
      text-align: right;
      padding-right: 10px;
      color: white;
      font-weight: bold;
    }
    .azul { background-color: #007bff; }
    .verde { background-color: #28a745; }
    #error {
      color: red;
      margin-top: 20px;
      font-weight: bold;
    }
    #diferencia {
      margin-top: 20px;
      font-weight: bold;
      color: darkred;
    }
  </style>
</head>
<body>
  <h1>Resultados Segunda Vuelta</h1>

  <div id="candidato1" class="candidato"></div>
  <div id="barra1" class="barra"><div id="relleno1" class="relleno azul"></div></div>

  <div id="candidato2" class="candidato"></div>
  <div id="barra2" class="barra"><div id="relleno2" class="relleno verde"></div></div>

  <div id="diferencia"></div>
  <div id="error"></div>

  <script>
    async function cargarResultados() {
      try {
        const response = await fetch("https://resultados-onpe.vercel.app/api/resultados");
        const data = await response.json();

        if (!data.candidatos || data.candidatos.length < 2) {
          document.getElementById("error").innerText = "Esperando actualización oficial de ONPE...";
          return;
        }

        const c1 = data.candidatos[0];
        const c2 = data.candidatos[1];

        // Si los votos son 0, mostrar mensaje de espera
        if (c1.votos === 0 && c2.votos === 0) {
          document.getElementById("error").innerText = "Esperando actualización oficial de ONPE...";
          return;
        } else {
          document.getElementById("error").innerText = "";
        }

        // Mostrar candidatos
        document.getElementById("candidato1").innerText =
          `${c1.nombre} - ${c1.votos.toLocaleString()} votos (${c1.porcentaje})`;
        document.getElementById("candidato2").innerText =
          `${c2.nombre} - ${c2.votos.toLocaleString()} votos (${c2.porcentaje})`;

        // Barras de porcentaje
        document.getElementById("relleno1").style.width = c1.porcentaje;
        document.getElementById("relleno1").innerText = c1.porcentaje;
        document.getElementById("relleno2").style.width = c2.porcentaje;
        document.getElementById("relleno2").innerText = c2.porcentaje;

        // Diferencia de votos
        const diferencia = Math.abs(c1.votos - c2.votos);
        document.getElementById("diferencia").innerText =
          `Diferencia de votos: ${diferencia.toLocaleString()}`;
      } catch (error) {
        document.getElementById("error").innerText = "Error cargando resultados";
      }
    }

    // Cargar al inicio y refrescar cada 30 segundos
    cargarResultados();
    setInterval(cargarResultados, 30000);
  </script>
</body>
</html>
